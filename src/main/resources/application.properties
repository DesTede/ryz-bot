spring.datasource.url=jdbc:mysql://localhost:3306/yaniv_bot?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

admin.phones=${ADMIN_PHONES}

bot.active=true

delivery.dispatch.before.minutes=${DELIVERY_DISPATCH_BEFORE_MINUTES:5}

whatsapp.provider=meta
whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.api-version=v18.0
whatsapp.webhook-verify-token=${WHATSAPP_WEBHOOK_VERIFY_TOKEN}

#twilio.account-sid=${TWILIO_ACCOUNT_SID}
#twilio.auth-token=${TWILIO_AUTH_TOKEN}
#twilio.whatsapp-number=${TWILIO_WHATSAPP_NUMBER}

google.maps.api-key=${GOOGLE_MAPS_API_KEY}
google.sheets.id=${GOOGLE_SHEETS_ID}
google.sheets.credentials-path=${GOOGLE_SHEETS_CREDENTIALS_PATH}
