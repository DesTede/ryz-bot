

#spring.config.import=optional:classpath:application-local.properties
#spring.application.name=Yanivbot


#-----railway timing issues solution:------
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=300000
spring.jpa.show-sql=false

spring.jpa.open-in-view=false

#spring.datasource.url=jdbc:mysql://localhost:3306/yaniv_bot?createDatabaseIfNotExist=true
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update





bot.active=true

app.base-url=https://yanivbot-production.up.railway.app

# ========== DISPATCH SETTINGS ==========
# Dispatch expanding-radius steps (km), comma-separated, in order. Shared by taxi + delivery.
dispatch.radius.steps=1,2,10
# How long an order may sit unclaimed before expanding to next radius (minutes)
dispatch.unclaimed.expand.minutes=1

# Order monitor timing (minutes)
monitor.taxi.alert.minutes=6
monitor.delivery.alert.minutes=6
monitor.admin.repeat.alert.minutes=3
monitor.driver.stale.location.minutes=10
monitor.driver.stale.realert.minutes=5
monitor.driver.auto.clockout.minutes=20

# ========== DRIVER CONFIGURATION ==========
driver.max-active-deliveries=3

# ========== ADMIN SETTINGS ==========
admin.phones=${ADMIN_PHONES}

delivery.dispatch.before.minutes=${DELIVERY_DISPATCH_BEFORE_MINUTES:5}

whatsapp.provider=meta
whatsapp.api.url=https://graph.facebook.com/v23.0/1030297290166672/messages

whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.api-version=v23.0
whatsapp.webhook-verify-token=${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
whatsapp.app-secret=${WHATSAPP_APP_SECRET}
admin.api-key=${ADMIN_API_KEY}

google.maps.api-key=${GOOGLE_MAPS_API_KEY}

jwt.secret=${JWT_SECRET}